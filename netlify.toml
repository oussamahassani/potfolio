# Netlify Configuration
name = "portfolio"
build = { command = "npm run build", publish = "build", functions = "functions" }

# Redirect all non-file requests to index.html (for client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    "X-Content-Type-Options" = "nosniff"
    "X-Frame-Options" = "SAMEORIGIN"
    "X-XSS-Protection" = "1; mode=block"
    "Referrer-Policy" = "strict-origin-when-cross-origin"
    "Permissions-Policy" = "geolocation=(), microphone=(), camera=()"
    
    # HSTS (only enable for production)
    "Strict-Transport-Security" = "max-age=31536000; includeSubDomains; preload"
    
    # Cache Policy
    "Cache-Control" = "public, max-age=3600"

# Cache static assets longer
[[headers]]
  for = "/static/*"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"

# Cache service worker with short expiry
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    "Cache-Control" = "max-age=0, no-cache"

# Cache HTML with moderate expiry
[[headers]]
  for = "/*.html"
  [headers.values]
    "Cache-Control" = "public, max-age=3600"

# API routes (example)
[[redirects]]
  from = "/api/*"
  to = "https://api.yourportfolio.com/:splat"
  status = 200
  force = false

# Redirects for old URLs (example)
[[redirects]]
  from = "/old-portfolio"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog/:id"
  to = "/#blog"
  status = 301

# Custom domain setup
# Change this to your domain
# domain = "yourportfolio.com"

# Environment-specific settings
[context.production]
  command = "npm run build"
  environment = { NODE_ENV = "production", GENERATE_SOURCEMAP = "false" }

[context.deploy-preview]
  command = "npm run build"
  environment = { NODE_ENV = "staging" }

[context.branch-deploy]
  command = "npm run build"
  environment = { NODE_ENV = "staging" }

# Plugins
[[plugins]]
  package = "netlify-plugin-lighthouse"
  [plugins.inputs]
    output_path = "lighthouse"
    # Set to "true" to upload lighthouse reports to S3 for automated alerting
    upload_remote = false
    # Audit URLs
    audits = ["/", "/#portfolio", "/#services", "/#blog"]

# Form handling
[build.environment]
  # Enable Netlify Form
  SITE_ID = "your-site-id"

# Functions (serverless)
[functions]
  "directory" = "functions"
  "node_bundler" = "esbuild"
